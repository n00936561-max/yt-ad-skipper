<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      width: 200px;
      padding: 16px;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #ff0000;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #ff0000; }
    input:checked + .slider::before { transform: translateX(18px); }
    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h2>YT Ad Skipper</h2>
  <div class="row">
    <span>Enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="status">Loading...</div>
  <script src="popup.js"></script>
</body>
</html>
